<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="进销存">
<link rel="manifest" href="manifest.json">
<title>进销存管理系统</title>
<style>
/* ═══════════════ RESET & ROOT ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c14;--srf:#141725;--crd:#1a1e2e;--bdr:#252a3a;
  --tx:#e2e4eb;--tx2:#888ca0;--tx3:#5a5e70;
  --ac:#d4943a;--ac2:#b87a2a;--gr:#4a9e6c;--rd:#c54a4a;--bl:#5b8cc9;
  --mono:'JetBrains Mono',monospace;--r:8px;--rs:5px;
  --nav:60px;--hd:50px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;
  min-height:100dvh;padding-bottom:calc(var(--nav)+20px);
  overflow-x:hidden;
}
#app{max-width:640px;margin:0 auto;padding:0 16px}

/* ═══════════════ BOTTOM NAV ═══════════════ */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:640px;height:var(--nav);
  background:var(--srf);border-top:1px solid var(--bdr);
  display:flex;z-index:100;border-radius:14px 14px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.45);padding:0 6px;
}
#nav .t{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--tx3);font-size:10px;
  cursor:pointer;transition:color .18s;gap:3px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
#nav .t.ac{color:var(--ac)}
#nav .t svg{width:22px;height:22px}

/* ═══════════════ HEADER ═══════════════ */
.hd{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;
  justify-content:space-between;height:var(--hd);padding:0 2px;
  background:var(--bg);
}
.hd h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.hd .role{
  font-size:11px;padding:4px 12px;border-radius:20px;
  background:var(--crd);border:1px solid var(--bdr);
  color:var(--ac);cursor:pointer;font-family:var(--mono);font-weight:500;
}

/* ═══════════════ CARDS ═══════════════ */
.cd{
  background:var(--crd);border-radius:var(--r);padding:14px;
  margin-bottom:10px;border:1px solid var(--bdr);
}
.cd-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cd-h span{font-size:13px;font-weight:600;color:var(--tx)}
.cd-h small{font-size:11px;color:var(--tx3)}

/* ═══════════════ STATS ROW ═══════════════ */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st{
  background:var(--crd);border-radius:var(--r);padding:12px;
  border:1px solid var(--bdr);
}
.st .v{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--ac)}
.st .l{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ═══════════════ TABLE ═══════════════ */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;color:var(--tx3);font-weight:500;font-size:10px;
  text-transform:uppercase;letter-spacing:.5px;padding:6px 4px;border-bottom:1px solid var(--bdr)}
.tbl td{padding:8px 4px;border-bottom:1px solid var(--bdr);color:var(--tx);line-height:1.4}
.tbl td.m{font-family:var(--mono);font-size:11px;color:var(--ac)}
.tbl tr:last-child td{border-bottom:none}

/* ═══════════════ FORM ═══════════════ */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;color:var(--tx3);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:9px 12px;background:var(--srf);border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--tx);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ac)}
.fg-row{display:flex;gap:8px}
.fg-row .fg{flex:1}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;
  cursor:pointer;border:none;transition:all .15s;gap:6px;
  -webkit-tap-highlight-color:transparent;font-family:inherit;
  min-height:38px;
}
.btn-p{background:var(--ac);color:#0a0c14}
.btn-p:active{background:var(--ac2)}
.btn-o{background:transparent;color:var(--ac);border:1px solid var(--ac)}
.btn-o:active{background:var(--ac);color:#0a0c14}
.btn-s{background:var(--srf);color:var(--tx);border:1px solid var(--bdr)}
.btn-s:active{background:var(--bdr)}
.btn-r{background:transparent;color:var(--rd);border:1px solid var(--rd)}
.btn-r:active{background:var(--rd);color:#fff}
.btn.green{background:var(--gr);color:#fff}
.btn.block{width:100%}
.btn.sm{font-size:11px;padding:5px 10px;min-height:28px}

/* ═══════════════ TAGS ═══════════════ */
.tag{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  font-weight:500;font-family:var(--mono);
}
.tag.warn{background:rgba(212,148,58,.15);color:var(--ac)}
.tag.ok{background:rgba(74,158,108,.15);color:var(--gr)}
.tag.err{background:rgba(197,74,74,.15);color:var(--rd)}
.tag.info{background:rgba(91,140,201,.15);color:var(--bl)}

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .15s ease-out;
}
.modal{
  background:var(--srf);border-radius:14px 14px 0 0;width:100%;max-width:640px;
  max-height:85dvh;overflow-y:auto;padding:16px;animation:slideUp .25s ease-out;
}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-h h2{font-size:16px;font-weight:600}
.modal-h .close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:var(--crd);cursor:pointer;color:var(--tx3);font-size:18px;
  -webkit-tap-highlight-color:transparent;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ═══════════════ ORDER ITEM ROW ═══════════════ */
.oi-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.oi-row:last-child{border-bottom:none}
.oi-row .prod{flex:1;font-size:13px}
.oi-row .qty{width:60px;text-align:center;background:var(--bg);border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--tx);padding:6px;font-family:var(--mono);font-size:13px;outline:none}
.oi-row .qty:focus{border-color:var(--ac)}
.oi-row .sub{font-family:var(--mono);font-size:12px;color:var(--ac);width:60px;text-align:right}

/* ═══════════════ EMPTY STATE ═══════════════ */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px;line-height:1.6}

/* ═══════════════ UTILS ═══════════════ */
.flex{display:flex}.gap8{gap:8px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.between{justify-content:space-between}
.acenter{align-items:center}.txtr{text-align:right}
.page{display:none}.page.v{display:block}

/* ═══════════════ SCROLLBAR ═══════════════ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <h1 id="pageTitle">仪表盘</h1>
    <div class="role" onclick="toggleRole()" id="roleBadge">总店</div>
  </div>

  <!-- ═══════════════ PAGE: Dashboard ═══════════════ -->
  <div class="page v" id="pg_dash">
    <div class="stats">
      <div class="st"><div class="v" id="dash_total_products">0</div><div class="l">商品数</div></div>
      <div class="st"><div class="v" id="dash_total_stores">0</div><div class="l">加盟店</div></div>
      <div class="st"><div class="v" id="dash_today_orders">0</div><div class="l">今日报货</div></div>
      <div class="st"><div class="v" id="dash_pending_bills">0</div><div class="l">待结账单</div></div>
    </div>
    <div class="cd">
      <div class="cd-h"><span>低库存预警</span><small>库存 &lt; 10</small></div>
      <div id="dash_low_stock"></div>
    </div>
    <div class="cd">
      <div class="cd-h"><span>近期账单</span><small onclick="switchTab(4)" style="cursor:pointer;color:var(--ac)">查看全部</small></div>
      <div id="dash_recent_bills"></div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: Products ═══════════════ -->
  <div class="page" id="pg_products">
    <div class="flex between acenter mb8">
      <input placeholder="搜索商品..." id="prodSearch" oninput="renderProducts()"
        style="flex:1;padding:10px 12px;background:var(--crd);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
      <button class="btn btn-p sm" style="margin-left:8px;white-space:nowrap" onclick="openProductModal()">+ 添加</button>
    </div>
    <div id="prodList"></div>
  </div>

  <!-- ═══════════════ PAGE: Stores ═══════════════ -->
  <div class="page" id="pg_stores">
    <div class="flex between acenter mb8">
      <span style="font-size:13px;color:var(--tx2)" id="storeCount">共 0 家</span>
      <button class="btn btn-p sm" onclick="openStoreModal()">+ 添加</button>
    </div>
    <div id="storeList"></div>
  </div>

  <!-- ═══════════════ PAGE: Orders ═══════════════ -->
  <div class="page" id="pg_orders">
    <div class="flex acenter gap8 mb8">
      <input type="date" id="orderDate" onchange="renderOrders()"
        style="flex:1;padding:10px 12px;background:var(--crd);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;font-family:var(--mono)">
      <button class="btn btn-p sm" style="white-space:nowrap" onclick="openOrderModal()">+ 报货单</button>
    </div>
    <div id="orderList"></div>
  </div>

  <!-- ═══════════════ PAGE: Bills ═══════════════ -->
  <div class="page" id="pg_bills">
    <div class="flex acenter gap8 mb8">
      <select id="billStoreFilter" onchange="renderBills()"
        style="flex:1;padding:10px 12px;background:var(--crd);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
      </select>
      <select id="billStatusFilter" onchange="renderBills()"
        style="padding:10px 12px;background:var(--crd);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;width:100px">
        <option value="">全部</option><option value="pending">待结</option><option value="paid">已结</option>
      </select>
    </div>
    <div id="billList"></div>
  </div>

  <!-- ═══════════════ NAV ═══════════════ -->
  <nav id="nav">
    <div class="t ac" onclick="switchTab(0)" id="nav0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>概览</span></div>
    <div class="t" onclick="switchTab(1)" id="nav1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>商品</span></div>
    <div class="t" onclick="switchTab(2)" id="nav2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>店铺</span></div>
    <div class="t" onclick="switchTab(3)" id="nav3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>报货</span></div>
    <div class="t" onclick="switchTab(4)" id="nav4">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
      <span>账单</span></div>
  </nav>
</div>

<!-- ═══════════════ MODALS ═══════════════ -->
<div id="modalContainer"></div>

<script>
/* ═══════════════ DATA LAYER ═══════════════ */
const LS=localStorage;
const K={products:'p',stores:'s',orders:'o',bills:'b',role:'role'};

function load(k,d){try{return JSON.parse(LS.getItem(k)||'null')||d}catch(e){return d}}
function save(k,v){LS.setItem(k,JSON.stringify(v))}

let products=load(K.products,[]);
let stores=load(K.stores,[]);
let orders=load(K.orders,[]);
let bills=load(K.bills,[]);
let currentRole=load(K.role,'main'); // 'main' = 总店, store_id = 分店
let currentTab=0;

// Seed demo data if empty
if(!stores.length){
  stores=[
    {id:'s1',name:'总店',type:'main',contact:'张总',phone:'13800000001',addr:'市中心A座'},
    {id:'s2',name:'城东分店',type:'branch',contact:'李店长',phone:'13800000002',addr:'城东B区'},
    {id:'s3',name:'王记便利店',type:'franchise',contact:'王老板',phone:'13800000003',addr:'阳光路12号'},
    {id:'s4',name:'便民超市',type:'franchise',contact:'赵老板',phone:'13800000004',addr:'建设路45号'},
    {id:'s5',name:'好邻居',type:'franchise',contact:'钱老板',phone:'13800000005',addr:'和平路78号'},
  ];
  save(K.stores,stores);
}
if(!products.length){
  products=[
    {id:'p1',name:'农夫山泉550ml',sku:'NFS-550',price:0.85,price2:1.5,stock:240,unit:'箱(24瓶)'},
    {id:'p2',name:'康师傅红烧牛肉面',sku:'KSF-HS',price:2.8,price2:4.0,stock:85,unit:'箱(24包)'},
    {id:'p3',name:'青岛啤酒500ml',sku:'QD-PJ',price:3.5,price2:5.0,stock:120,unit:'箱(12瓶)'},
    {id:'p4',name:'王老吉310ml',sku:'WLJ-310',price:2.5,price2:3.5,stock:7,unit:'箱(24罐)'},
    {id:'p5',name:'伊利纯牛奶250ml',sku:'YL-NN',price:2.2,price2:3.0,stock:45,unit:'箱(24盒)'},
    {id:'p6',name:'可口可乐330ml',sku:'KKL-330',price:1.8,price2:2.5,stock:3,unit:'箱(24罐)'},
    {id:'p7',name:'金龙鱼调和油5L',sku:'JLY-5L',price:42,price2:55,stock:18,unit:'桶'},
    {id:'p8',name:'海天酱油500ml',sku:'HT-JY',price:6.5,price2:8.5,stock:60,unit:'瓶'},
  ];
  save(K.products,products);
}
if(!orders.length){
  const today=new Date().toISOString().slice(0,10);
  orders=[
    {id:'o1',storeId:'s3',date:today,items:[{prodId:'p1',qty:5},{prodId:'p2',qty:3},{prodId:'p4',qty:2}],status:'confirmed'},
    {id:'o2',storeId:'s4',date:today,items:[{prodId:'p3',qty:4},{prodId:'p6',qty:6}],status:'confirmed'},
    {id:'o3',storeId:'s5',date:today,items:[{prodId:'p7',qty:2},{prodId:'p8',qty:3}],status:'pending'},
  ];
  save(K.orders,orders);
}
if(!bills.length){
  bills=[
    {id:'b1',storeId:'s3',date:'2026-06-20',orderIds:['o1'],total:0,status:'pending'},
    {id:'b2',storeId:'s4',date:'2026-06-19',orderIds:['o2'],total:0,status:'paid'},
  ];
  save(K.bills,bills);
}

/* ═══════════════ HELPERS ═══════════════ */
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function fmt(n){return n.toFixed(2)}
function byId(s,id){return s.find(x=>x.id===id)}
function storeName(id){const s=byId(stores,id);return s?s.name:'未知'}
function prodName(id){const p=byId(products,id);return p?p.name:'未知'}
function prodPrice(id){const p=byId(products,id);return p?p.price:0}
function isMain(){return currentRole==='main'}
function isBranch(){return stores.some(s=>s.id===currentRole&&s.type==='branch')}

function visibleStores(){
  if(isMain())return stores.filter(s=>s.type!=='main');
  if(isBranch())return stores.filter(s=>s.type==='franchise');
  return stores.filter(s=>s.id===currentRole);
}

function visibleOrders(){
  const vs=visibleStores().map(s=>s.id);
  return orders.filter(o=>vs.includes(o.storeId));
}

/* ═══════════════ NAVIGATION ═══════════════ */
const titles=['仪表盘','商品管理','店铺管理','报货单','供货账单'];

function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('v',i===idx));
  document.querySelectorAll('#nav .t').forEach((t,i)=>t.classList.toggle('ac',i===idx));
  document.getElementById('pageTitle').textContent=titles[idx];
  refreshTab(idx);
  // scroll to top
  window.scrollTo(0,0);
}

function refreshTab(idx){
  if(idx===0)refreshDash();
  if(idx===1)renderProducts();
  if(idx===2)renderStores();
  if(idx===3)renderOrders();
  if(idx===4){renderBillFilters();renderBills();}
}

function toggleRole(){
  if(isMain()){
    const branch=stores.find(s=>s.type==='branch');
    if(branch){currentRole=branch.id;document.getElementById('roleBadge').textContent=branch.name}
    else{currentRole='main';document.getElementById('roleBadge').textContent='总店'}
  }else if(isBranch()){
    currentRole='main';document.getElementById('roleBadge').textContent='总店';
  }else{
    currentRole='main';document.getElementById('roleBadge').textContent='总店';
  }
  save(K.role,currentRole);
  refreshTab(currentTab);
}

/* ═══════════════ DASHBOARD ═══════════════ */
function refreshDash(){
  const vs=visibleStores();
  document.getElementById('dash_total_products').textContent=products.length;
  document.getElementById('dash_total_stores').textContent=vs.length;
  const today=new Date().toISOString().slice(0,10);
  const todayOrders=visibleOrders().filter(o=>o.date===today);
  document.getElementById('dash_today_orders').textContent=todayOrders.length;
  const pendingBills=bills.filter(b=>b.status==='pending'&&vs.some(s=>s.id===b.storeId));
  document.getElementById('dash_pending_bills').textContent=pendingBills.length;

  // Low stock
  const low=products.filter(p=>p.stock<10);
  const lowDiv=document.getElementById('dash_low_stock');
  if(!low.length){lowDiv.innerHTML='<div class="empty"><p>暂无低库存商品</p></div>';return}
  lowDiv.innerHTML=low.map(p=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)">
      <span style="font-size:12px">${p.name}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--rd)">${p.stock} ${p.unit}</span>
    </div>`
  ).join('');

  // Recent bills
  const recentBills=bills.filter(b=>vs.some(s=>s.id===b.storeId)).slice(-5).reverse();
  const rbDiv=document.getElementById('dash_recent_bills');
  if(!recentBills.length){rbDiv.innerHTML='<div class="empty"><p>暂无账单</p></div>';return}
  rbDiv.innerHTML=recentBills.map(b=>{
    const total=calcBillTotal(b);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)">
      <span style="font-size:12px">${storeName(b.storeId)} · ${b.date}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--ac)">¥${fmt(total)}</span>
      <span class="tag ${b.status==='paid'?'ok':'warn'}">${b.status==='paid'?'已结':'待结'}</span>
    </div>`;
  }).join('');
}

/* ═══════════════ PRODUCTS ═══════════════ */
function renderProducts(){
  const q=(document.getElementById('prodSearch').value||'').toLowerCase();
  const list=products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||(p.id===q));
  const div=document.getElementById('prodList');
  if(!list.length){div.innerHTML='<div class="empty"><p>暂无商品</p></div>';return}
  div.innerHTML=list.map(p=>
    `<div class="cd" style="cursor:pointer" onclick="openProductModal('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:13px;font-weight:500">${p.name}</div>
          <div style="font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${p.sku}</div>
        </div>
        <span class="tag ${p.stock<10?'err':p.stock<30?'warn':'ok'}">库存 ${p.stock} ${p.unit}</span>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--tx2)">
        <span>批发 ¥${p.price}</span>
        <span>零售 ¥${p.price2}</span>
      </div>
    </div>`
  ).join('');
}

function openProductModal(id){
  const p=id?byId(products,id):null;
  const title=p?'编辑商品':'添加商品';
  const html=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-h"><h2>${title}</h2><div class="close" onclick="closeModal()">×</div></div>
      <div class="fg"><label>商品名称</label><input id="pf_name" value="${p?p.name:''}"></div>
      <div class="fg"><label>SKU 编码</label><input id="pf_sku" value="${p?p.sku:''}"></div>
      <div class="fg-row">
        <div class="fg"><label>批发价 ¥</label><input id="pf_price" type="number" step="0.01" value="${p?p.price:''}"></div>
        <div class="fg"><label>零售价 ¥</label><input id="pf_price2" type="number" step="0.01" value="${p?p.price2:''}"></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>库存数量</label><input id="pf_stock" type="number" value="${p?p.stock:0}"></div>
        <div class="fg"><label>单位</label><input id="pf_unit" value="${p?p.unit:'件'}"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        ${p?`<button class="btn btn-r block" onclick="deleteProduct('${p.id}')">删除</button>`:''}
        <button class="btn btn-p block" onclick="saveProduct('${p?p.id:''}')">保存</button>
      </div>
    </div>
  </div>`;
  showModal(html);
}

function saveProduct(id){
  const data={
    id:id||uid(),
    name:document.getElementById('pf_name').value.trim(),
    sku:document.getElementById('pf_sku').value.trim(),
    price:parseFloat(document.getElementById('pf_price').value)||0,
    price2:parseFloat(document.getElementById('pf_price2').value)||0,
    stock:parseInt(document.getElementById('pf_stock').value)||0,
    unit:document.getElementById('pf_unit').value.trim()||'件',
  };
  if(!data.name)return alert('请输入商品名称');
  if(id){const idx=products.findIndex(p=>p.id===id);if(idx>=0)products[idx]=data}
  else products.push(data);
  save(K.products,products);
  closeModal();
  renderProducts();
  refreshDash();
}

function deleteProduct(id){
  if(!confirm('确定删除该商品？'))return;
  products=products.filter(p=>p.id!==id);
  save(K.products,products);
  closeModal();
  renderProducts();
  refreshDash();
}

/* ═══════════════ STORES ═══════════════ */
function renderStores(){
  const list=isMain()?stores:visibleStores();
  document.getElementById('storeCount').textContent=`共 ${list.length} 家`;
  const div=document.getElementById('storeList');
  if(!list.length){div.innerHTML='<div class="empty"><p>暂无店铺</p></div>';return}
  const typeLabel={main:'总店',branch:'分店',franchise:'加盟店'};
  div.innerHTML=list.map(s=>
    `<div class="cd">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:13px;font-weight:500">${s.name}</div>
          <div style="font-size:10px;color:var(--tx3);margin-top:2px">${s.addr}</div>
        </div>
        <span class="tag ${s.type==='main'?'info':s.type==='branch'?'ok':'warn'}">${typeLabel[s.type]}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span style="font-size:10px;color:var(--tx3)">${s.contact} · ${s.phone}</span>
        ${s.type==='main'?'':`<button class="btn btn-o sm" onclick="openStoreModal('${s.id}')">编辑</button>`}
      </div>
    </div>`
  ).join('');
}

function openStoreModal(id){
  const s=id?byId(stores,id):null;
  const title=s?'编辑店铺':'添加店铺';
  const html=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-h"><h2>${title}</h2><div class="close" onclick="closeModal()">×</div></div>
      <div class="fg"><label>店铺名称</label><input id="sf_name" value="${s?s.name:''}"></div>
      <div class="fg"><label>类型</label><select id="sf_type">
        <option value="franchise" ${s&&s.type==='franchise'?'selected':''}>加盟店</option>
        <option value="branch" ${s&&s.type==='branch'?'selected':''}>分店</option>
        ${isMain()?'<option value="main" '+(s&&s.type==='main'?'selected':'')+'>总店</option>':''}
      </select></div>
      <div class="fg"><label>联系人</label><input id="sf_contact" value="${s?s.contact:''}"></div>
      <div class="fg"><label>电话</label><input id="sf_phone" value="${s?s.phone:''}"></div>
      <div class="fg"><label>地址</label><input id="sf_addr" value="${s?s.addr:''}"></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        ${s&&s.type!=='main'?`<button class="btn btn-r block" onclick="deleteStore('${s.id}')">删除</button>`:''}
        <button class="btn btn-p block" onclick="saveStore('${s?s.id:''}')">保存</button>
      </div>
    </div>
  </div>`;
  showModal(html);
}

function saveStore(id){
  const data={
    id:id||uid(),
    name:document.getElementById('sf_name').value.trim(),
    type:document.getElementById('sf_type').value,
    contact:document.getElementById('sf_contact').value.trim(),
    phone:document.getElementById('sf_phone').value.trim(),
    addr:document.getElementById('sf_addr').value.trim(),
  };
  if(!data.name)return alert('请输入店铺名称');
  if(id){const idx=stores.findIndex(s=>s.id===id);if(idx>=0)stores[idx]=data}
  else stores.push(data);
  save(K.stores,stores);
  closeModal();
  renderStores();
  refreshDash();
}

function deleteStore(id){
  if(!confirm('确定删除该店铺？关联数据将被保留。'))return;
  stores=stores.filter(s=>s.id!==id);
  save(K.stores,stores);
  closeModal();
  renderStores();
  refreshDash();
}

/* ═══════════════ ORDERS ═══════════════ */
function renderOrders(){
  const date=document.getElementById('orderDate').value||new Date().toISOString().slice(0,10);
  const list=visibleOrders().filter(o=>o.date===date);
  const div=document.getElementById('orderList');
  if(!list.length){div.innerHTML='<div class="empty"><p>${date} 暂无报货单</p></div>';return}

  div.innerHTML=list.map(o=>{
    const total=o.items.reduce((s,i)=>s+prodPrice(i.prodId)*i.qty,0);
    const itemsHtml=o.items.map(i=>
      `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0">
        <span style="color:var(--tx2)">${prodName(i.prodId)}</span>
        <span style="font-family:var(--mono);color:var(--tx2)">×${i.qty}</span>
      </div>`
    ).join('');
    return `<div class="cd">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:500">${storeName(o.storeId)}</span>
        <span class="tag ${o.status==='confirmed'?'ok':'warn'}">${o.status==='confirmed'?'已确认':'待确认'}</span>
      </div>
      ${itemsHtml}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">
        <span style="font-family:var(--mono);font-size:14px;color:var(--ac)">¥${fmt(total)}</span>
        <div style="display:flex;gap:6px">
          ${o.status==='pending'?`<button class="btn btn-s sm" onclick="confirmOrder('${o.id}')">确认</button>`:''}
          <button class="btn btn-r sm" onclick="deleteOrder('${o.id}')">删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openOrderModal(){
  const vs=visibleStores().filter(s=>s.type==='franchise');
  if(!vs.length)return alert('没有可报货的加盟店');
  const today=new Date().toISOString().slice(0,10);
  const storeOpts=vs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const prodOpts=products.map(p=>`<option value="${p.id}">${p.name} (¥${p.price})</option>`).join('');

  const html=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="padding-bottom:24px">
      <div class="modal-h"><h2>新建报货单</h2><div class="close" onclick="closeModal()">×</div></div>
      <div class="fg"><label>日期</label><input type="date" id="of_date" value="${today}"></div>
      <div class="fg"><label>加盟店</label><select id="of_store">${storeOpts}</select></div>
      <div class="fg"><label>添加商品</label>
        <div style="display:flex;gap:6px">
          <select id="of_prod" style="flex:1">${prodOpts}</select>
          <input id="of_qty" type="number" value="1" min="1" style="width:60px;text-align:center">
          <button class="btn btn-o sm" onclick="addOrderItem()">添加</button>
        </div>
      </div>
      <div id="of_items" style="margin-top:8px;min-height:40px">
        <div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">暂未添加商品</div>
      </div>
      <div style="text-align:right;font-family:var(--mono);font-size:14px;color:var(--ac);margin:8px 0" id="of_total">¥0.00</div>
      <button class="btn btn-p block" onclick="saveOrder()">提交报货单</button>
    </div>
  </div>`;
  showModal(html);
  window._orderItems=[];
  window.updateOrderItemsUI=function(){
    const div=document.getElementById('of_items');
    if(!window._orderItems.length){div.innerHTML='<div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">暂未添加商品</div>';}
    else div.innerHTML=window._orderItems.map((it,idx)=>
      `<div class="oi-row">
        <span class="prod">${prodName(it.prodId)}</span>
        <input class="qty" type="number" value="${it.qty}" min="1" onchange="window._orderItems[${idx}].qty=parseInt(this.value)||1;window.updateOrderItemsUI()">
        <span class="sub">¥${fmt(prodPrice(it.prodId)*it.qty)}</span>
        <span style="cursor:pointer;color:var(--rd);font-size:16px;padding:4px" onclick="window._orderItems.splice(${idx},1);window.updateOrderItemsUI()">×</span>
      </div>`
    ).join('');
    const total=window._orderItems.reduce((s,i)=>s+prodPrice(i.prodId)*i.qty,0);
    document.getElementById('of_total').textContent='¥'+fmt(total);
  };
  window.addOrderItem=function(){
    const pid=document.getElementById('of_prod').value;
    const qty=parseInt(document.getElementById('of_qty').value)||1;
    const exist=window._orderItems.find(i=>i.prodId===pid);
    if(exist){exist.qty+=qty}else{window._orderItems.push({prodId:pid,qty})}
    window.updateOrderItemsUI();
  };
}

function saveOrder(){
  if(!window._orderItems||!window._orderItems.length)return alert('请添加商品');
  const order={
    id:uid(),
    storeId:document.getElementById('of_store').value,
    date:document.getElementById('of_date').value,
    items:window._orderItems,
    status:'pending'
  };
  orders.push(order);
  save(K.orders,orders);
  closeModal();
  document.getElementById('orderDate').value=order.date;
  renderOrders();
  refreshDash();
}

function confirmOrder(id){
  const o=byId(orders,id);
  if(o){o.status='confirmed';save(K.orders,orders)}
  renderOrders();
  refreshDash();
}

function deleteOrder(id){
  if(!confirm('确定删除该报货单？'))return;
  orders=orders.filter(o=>o.id!==id);
  save(K.orders,orders);
  renderOrders();
  refreshDash();
}

/* ═══════════════ BILLS ═══════════════ */
function renderBillFilters(){
  const vs=visibleStores().filter(s=>s.type==='franchise');
  const sel=document.getElementById('billStoreFilter');
  sel.innerHTML='<option value="">全部加盟店</option>'+vs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function calcBillTotal(bill){
  let total=0;
  bill.orderIds.forEach(oid=>{
    const o=byId(orders,oid);
    if(o)o.items.forEach(i=>{total+=prodPrice(i.prodId)*i.qty});
  });
  return total;
}

function renderBills(){
  const storeFilter=document.getElementById('billStoreFilter').value;
  const statusFilter=document.getElementById('billStatusFilter').value;
  const vs=visibleStores().map(s=>s.id);
  let list=bills.filter(b=>vs.includes(b.storeId));
  if(storeFilter)list=list.filter(b=>b.storeId===storeFilter);
  if(statusFilter)list=list.filter(b=>b.status===statusFilter);
  const div=document.getElementById('billList');
  if(!list.length){div.innerHTML='<div class="empty"><p>暂无账单</p></div>';return}
  div.innerHTML=list.map(b=>{
    const total=calcBillTotal(b);
    return `<div class="cd" onclick="openBillModal('${b.id}')" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:500">${storeName(b.storeId)}</div>
          <div style="font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${b.date} · ${b.orderIds.length}单</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ac)">¥${fmt(total)}</div>
          <span class="tag ${b.status==='paid'?'ok':'warn'}" style="margin-top:4px">${b.status==='paid'?'已结':'待结'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function generateBill(){
  const vs=visibleStores().filter(s=>s.type==='franchise');
  if(!vs.length)return alert('没有加盟店');
  const storeOpts=vs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const html=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-h"><h2>生成供货账单</h2><div class="close" onclick="closeModal()">×</div></div>
      <div class="fg"><label>加盟店</label><select id="bf_store">${storeOpts}</select></div>
      <div class="fg"><label>日期</label><input type="date" id="bf_date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div id="bf_orders" style="margin-top:8px;max-height:200px;overflow-y:auto">
        <div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">请先选择加盟店</div>
      </div>
      <div style="text-align:right;font-family:var(--mono);font-size:14px;color:var(--ac);margin:8px 0" id="bf_total">¥0.00</div>
      <button class="btn btn-p block" onclick="saveBill()">生成账单</button>
    </div>
  </div>`;
  showModal(html);
  window._billOrderIds=[];
  document.getElementById('bf_store').onchange=function(){
    const sid=this.value;
    const confirmedOrders=orders.filter(o=>o.storeId===sid&&o.status==='confirmed');
    const alreadyInBill=bills.flatMap(b=>b.orderIds);
    const available=confirmedOrders.filter(o=>!alreadyInBill.includes(o.id));
    const div=document.getElementById('bf_orders');
    if(!available.length){div.innerHTML='<div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">没有可入账的报货单</div>';return}
    window._billOrderIds=[];
    div.innerHTML=available.map(o=>{
      const total=o.items.reduce((s,i)=>s+prodPrice(i.prodId)*i.qty,0);
      return `<div class="oi-row" style="cursor:pointer" onclick="window._billOrderIds=window._billOrderIds.includes('${o.id}')?window._billOrderIds.filter(x=>x!=='${o.id}'):[...window._billOrderIds,'${o.id}'];this.style.background=window._billOrderIds.includes('${o.id}')?'rgba(212,148,58,.1)':'';updateBillTotal()">
        <span class="prod" style="color:var(--tx2)">${o.date} · ${o.items.length}种</span>
        <span class="sub">¥${fmt(total)}</span>
      </div>`;
    }).join('');
  };
  window.updateBillTotal=function(){
    let total=0;
    window._billOrderIds.forEach(oid=>{
      const o=byId(orders,oid);
      if(o)o.items.forEach(i=>{total+=prodPrice(i.prodId)*i.qty});
    });
    document.getElementById('bf_total').textContent='¥'+fmt(total);
  };
}

function saveBill(){
  if(!window._billOrderIds||!window._billOrderIds.length)return alert('请选择报货单');
  const bill={
    id:uid(),
    storeId:document.getElementById('bf_store').value,
    date:document.getElementById('bf_date').value,
    orderIds:[...window._billOrderIds],
    status:'pending'
  };
  bills.push(bill);
  save(K.bills,bills);
  closeModal();
  renderBills();
  refreshDash();
}

function openBillModal(id){
  const b=byId(bills,id);
  if(!b)return;
  const total=calcBillTotal(b);
  const orderDetails=b.orderIds.map(oid=>{
    const o=byId(orders,oid);
    if(!o)return'';
    const itemsHtml=o.items.map(i=>
      `<tr><td>${prodName(i.prodId)}</td><td class="m">${i.qty}</td><td class="m">¥${prodPrice(i.prodId)}</td><td class="m">¥${fmt(prodPrice(i.prodId)*i.qty)}</td></tr>`
    ).join('');
    return `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--tx3);margin-bottom:4px">报货日期: ${o.date}</div>
      <table class="tbl"><thead><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr></thead><tbody>${itemsHtml}</tbody></table></div>`;
  }).join('');

  const html=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-h"><h2>账单详情</h2><div class="close" onclick="closeModal()">×</div></div>
      <div style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600">${storeName(b.storeId)}</div>
        <div style="font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${b.date}</div>
      </div>
      ${orderDetails}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)">
        <span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ac)">¥${fmt(total)}</span>
        <span class="tag ${b.status==='paid'?'ok':'warn'}">${b.status==='paid'?'已结':'待结'}</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        ${b.status==='pending'?`<button class="btn green block" onclick="markBillPaid('${b.id}')">标记已结</button>`:''}
        <button class="btn btn-r block" onclick="deleteBill('${b.id}')">删除</button>
      </div>
    </div>
  </div>`;
  showModal(html);
}

function markBillPaid(id){
  const b=byId(bills,id);
  if(b){b.status='paid';save(K.bills,bills)}
  closeModal();
  renderBills();
  refreshDash();
}

function deleteBill(id){
  if(!confirm('确定删除该账单？'))return;
  bills=bills.filter(b=>b.id!==id);
  save(K.bills,bills);
  closeModal();
  renderBills();
  refreshDash();
}

/* ═══════════════ MODAL HELPERS ═══════════════ */
function showModal(html){
  document.getElementById('modalContainer').innerHTML=html;
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalContainer').innerHTML='';
  document.body.style.overflow='';
}

/* ═══════════════ INIT ═══════════════ */
document.getElementById('orderDate').value=new Date().toISOString().slice(0,10);
switchTab(0);

// Add generate bill button to bills page
const pgBills=document.getElementById('pg_bills');
const genBtn=document.createElement('button');
genBtn.className='btn btn-p block mt8';
genBtn.textContent='生成供货账单';
genBtn.onclick=generateBill;
pgBills.appendChild(genBtn);

// Register service worker for offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
