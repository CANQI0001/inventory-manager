<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>进销存系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--srf:#ffffff;--crd:#ffffff;--bdr:#e5e5ea;
  --tx:#1c1c1e;--tx2:#6e6e73;--tx3:#aeaeb2;
  --ac:#d4943a;--gr:#34c759;--rd:#ff3b30;--bl:#007aff;
  --mono:'JetBrains Mono',monospace;--r:8px;--rs:5px;
  --nav:60px;--hd:50px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--tx);min-height:100dvh;
  overflow-x:hidden;
}
#app{max-width:640px;margin:0 auto;padding:0 16px;padding-bottom:calc(var(--nav)+20px)}

/* auth page */
.auth-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:90dvh;gap:20px;padding:20px;
}
.auth-wrap .logo{font-size:26px;font-weight:700;color:var(--ac)}
.auth-wrap .sub{font-size:12px;color:var(--tx2);text-align:center}
.auth-card{
  background:var(--crd);border-radius:var(--r);padding:24px;
  border:1px solid var(--bdr);width:100%;max-width:340px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.auth-card h2{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.auth-card .switch{font-size:12px;color:var(--ac);text-align:center;margin-top:12px;cursor:pointer}
.auth-card .err{font-size:11px;color:var(--rd);text-align:center;margin-top:8px}

/* nav */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:640px;height:var(--nav);
  background:var(--srf);border-top:1px solid var(--bdr);
  display:flex;z-index:100;border-radius:14px 14px 0 0;
  box-shadow:0 -2px 12px rgba(0,0,0,.08);padding:0 6px;
}
#nav .t{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--tx3);font-size:10px;
  cursor:pointer;transition:color .18s;gap:3px;user-select:none;
}
#nav .t.ac{color:var(--ac)}
#nav .t svg{width:22px;height:22px}

/* header */
.hd{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;
  justify-content:space-between;height:var(--hd);padding:0 2px;
  background:var(--bg);border-bottom:1px solid var(--bdr);
}
.hd h1{font-size:17px;font-weight:600}
.hd .right{display:flex;align-items:center;gap:6px}
.hd .role{
  font-size:11px;padding:4px 12px;border-radius:20px;
  background:#f5f5f7;border:1px solid var(--bdr);
  color:var(--ac);font-family:var(--mono);font-weight:500;
}
.hd .logout-btn{font-size:11px;color:var(--rd);cursor:pointer;padding:4px 6px}

/* cards */
.cd{
  background:var(--crd);border-radius:var(--r);padding:14px;
  margin-bottom:10px;border:1px solid var(--bdr);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.cd-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cd-h span{font-size:13px;font-weight:600;color:var(--tx)}
.cd-h small{font-size:11px;color:var(--tx3)}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st{
  background:var(--crd);border-radius:var(--r);padding:12px;
  border:1px solid var(--bdr);box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.st .v{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--ac)}
.st .l{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;color:var(--tx3);font-weight:500;font-size:10px;padding:6px 4px;border-bottom:1px solid var(--bdr)}
.tbl td{padding:8px 4px;border-bottom:1px solid var(--bdr);color:var(--tx);line-height:1.4}
.tbl td.m{font-family:var(--mono);font-size:11px;color:var(--ac)}
.tbl tr:last-child td{border-bottom:none}

/* form */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:9px 12px;background:#f5f5f7;border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--tx);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.fg input:focus,.fg select:focus{border-color:var(--ac)}
.fg-row{display:flex;gap:8px}
.fg-row .fg{flex:1}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;gap:6px;
  font-family:inherit;min-height:40px;
}
.btn-w{background:#fff;color:#0a0c14;border:1px solid #ddd}
.btn-w:active{background:#eee}
.btn-b{background:#d0e4f7;color:#0a0c14}
.btn-b:active{background:#a8cce8}
.btn-d{background:transparent;color:var(--rd);border:1px solid var(--rd)}
.btn-d:active{background:var(--rd);color:#fff}
.btn.block{width:100%}
.btn.sm{font-size:11px;padding:5px 10px;min-height:28px}
.btn:disabled{opacity:.5;pointer-events:none}

/* role select for register */
.role-card{
  display:block;width:100%;padding:16px;border-radius:var(--r);
  border:1px solid var(--bdr);background:#f5f5f7;cursor:pointer;
  margin-bottom:10px;transition:all .15s;text-align:left;color:var(--tx);
}
.role-card:active,.role-card:hover{border-color:var(--ac);background:#f0f0f3}
.role-card .rc-icon{font-size:24px;margin-bottom:6px}
.role-card .rc-title{font-size:15px;font-weight:600;margin-bottom:3px}
.role-card .rc-desc{font-size:11px;color:var(--tx2)}

/* product picker */
.prod-pick-list{max-height:50vh;overflow-y:auto}
.prod-pick-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;
}
.prod-pick-row:active{opacity:.7}
.prod-pick-row .pp-info{flex:1}
.prod-pick-row .pp-name{font-size:13px;font-weight:500}
.prod-pick-row .pp-meta{font-size:10px;color:var(--tx3);margin-top:2px}
.prod-pick-row .pp-check{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--tx3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
}
.prod-pick-row.sel .pp-check{background:var(--ac);border-color:var(--ac)}
.prod-pick-row.sel .pp-check::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}

/* tags */
.tag{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
  font-weight:500;font-family:var(--mono);
}
.tag.warn{background:rgba(212,148,58,.1);color:var(--ac)}
.tag.ok{background:rgba(52,199,89,.1);color:var(--gr)}
.tag.err{background:rgba(255,59,48,.1);color:var(--rd)}
.tag.info{background:rgba(0,122,255,.1);color:var(--bl)}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:var(--srf);border-radius:14px 14px 0 0;width:100%;max-width:640px;
  max-height:85dvh;overflow-y:auto;padding:16px;
}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-h h2{font-size:16px;font-weight:600}
.modal-h .close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:#f5f5f7;cursor:pointer;color:var(--tx3);font-size:18px}

/* empty & loading */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty p{font-size:13px;line-height:1.6}
.spinner{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* utils */
.flex{display:flex}.gap8{gap:8px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.between{justify-content:space-between}
.acenter{align-items:center}.page{display:none}.page.v{display:block}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<!-- ═══════════ AUTH PAGE ═══════════ -->
<div class="page v" id="pg_auth">
  <div class="auth-wrap">
    <div class="logo">进销存管理</div>
    <div class="sub">多店进销存系统 · 账号登录</div>
    <div class="auth-card" id="authCard"></div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div class="page" id="pg_main">
  <div class="hd">
    <h1 id="pageTitle">仪表盘</h1>
    <div class="right">
      <span class="role" id="roleBadge"></span>
      <span class="logout-btn" onclick="doLogout()">退出</span>
    </div>
  </div>

<!-- ══ DASHBOARD ══ -->
<div class="page v" id="pg_dash">
  <div class="stats" id="dash_stats"></div>
  <div class="cd"><div class="cd-h"><span>低库存预警</span><small>库存 &lt; 10</small></div><div id="dash_low"></div></div>
  <div class="cd" id="dash_bills_box">
    <div class="cd-h"><span>近期账单</span><small id="dash_bills_link" style="cursor:pointer;color:var(--ac)"></small></div>
    <div id="dash_bills"></div>
  </div>
</div>

<!-- ══ PRODUCTS ══ -->
<div class="page" id="pg_products">
  <div class="flex between acenter mb8">
    <input placeholder="搜索商品..." id="prodSearch" oninput="renderProducts()"
      style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none">
    <button class="btn btn-b sm" style="margin-left:8px;white-space:nowrap" id="prodAddBtn" onclick="openProductModal()">+ 添加</button>
  </div>
  <div id="prodList"></div>
</div>

<!-- ══ STORES ══ -->
<div class="page" id="pg_stores">
  <div class="flex between acenter mb8">
    <span style="font-size:13px;color:var(--tx2)" id="storeCount"></span>
    <button class="btn btn-b sm" onclick="openStoreModal()">+ 添加</button>
  </div>
  <div id="storeList"></div>
</div>

<!-- ══ ORDERS ══ -->
<div class="page" id="pg_orders">
  <div class="flex acenter gap8 mb8">
    <input type="date" id="orderDate" onchange="renderOrders()"
      style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;font-family:var(--mono)">
    <button class="btn btn-w sm" style="white-space:nowrap" onclick="openOrderModal()">+ 报货单</button>
  </div>
  <div id="orderList"></div>
</div>

<!-- ══ BILLS ══ -->
<div class="page" id="pg_bills">
  <div class="flex acenter gap8 mb8">
    <select id="billStoreFilter" onchange="renderBills()"
      style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none"></select>
    <select id="billStatusFilter" onchange="renderBills()"
      style="padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;width:100px">
      <option value="">全部</option><option value="pending">待结</option><option value="paid">已结</option></select>
  </div>
  <div id="billList"></div>
  <button class="btn btn-w block mt8" onclick="generateBill()">生成供货账单</button>
</div>
</div>

<!-- ═══════════ NAV ═══════════ -->
<nav id="nav">
  <div class="t ac" onclick="switchTab(0)" id="nav0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>概览</span></div>
  <div class="t" onclick="switchTab(1)" id="nav1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>商品</span></div>
  <div class="t" onclick="switchTab(2)" id="nav2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>店铺</span></div>
  <div class="t" onclick="switchTab(3)" id="nav3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>报货</span></div>
  <div class="t" onclick="switchTab(4)" id="nav4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg><span>账单</span></div>
</nav>

<!-- ═══════════ MODAL ═══════════ -->
<div id="modalContainer"></div>

<script>
/* ============ SUPABASE INIT ============ */
const sb = supabase.createClient(
  'https://ldtjjrnvniirfrnmtfbd.supabase.co',
  'sb_publishable_NaiTMvOQ-Zgd0g3RMxU8XQ_0ELa_fsi'
);

let currentUser = null;
let profile = null;
let currentTab = 0;

/* ============ AUTH ============ */
function renderAuth(mode){
  const card = document.getElementById('authCard');
  const isLogin = mode==='login';
  card.innerHTML = `
    <h2>${isLogin?'登录':'注册'}</h2>
    <div class="fg"><label>邮箱</label><input type="email" id="af_email" placeholder="your@email.com"></div>
    <div class="fg"><label>密码</label><input type="password" id="af_pw" placeholder="至少6位"></div>
    <div class="err" id="af_err"></div>
    <button class="btn btn-w block mt8" onclick="doAuth('${mode}')">${isLogin?'登录':'注册'}</button>
    <div class="switch" onclick="renderAuth('${isLogin?'register':'login'}')">${isLogin?'没有账号？点击注册':'已有账号？点击登录'}</div>`;
}

async function doAuth(mode){
  const email = document.getElementById('af_email').value.trim();
  const pw = document.getElementById('af_pw').value;
  const err = document.getElementById('af_err');
  err.textContent = '';
  if(!email||!pw){err.textContent='请填写邮箱和密码';return}
  if(pw.length<6){err.textContent='密码至少6位';return}

  let res;
  if(mode==='login'){
    res = await sb.auth.signInWithPassword({email,password:pw});
  } else {
    res = await sb.auth.signUp({email,password:pw});
  }
  if(res.error){err.textContent=res.error.message;return}
  if(mode==='register'){
    err.style.color='var(--gr)';
    err.textContent='注册成功，正在登录...';
    setTimeout(async()=>{
      await sb.auth.signInWithPassword({email,password:pw});
    },800);
  }
}

/* ============ SESSION ============ */
sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser = session.user;
    const {data} = await sb.from('profiles').select('*').eq('id',currentUser.id).single();
    profile = data;
    showMainApp();
  } else {
    currentUser = null;
    profile = null;
    showAuthPage();
  }
});

function showAuthPage(){
  document.getElementById('pg_auth').classList.add('v');
  document.getElementById('pg_main').classList.remove('v');
  document.getElementById('nav').style.display='none';
  renderAuth('login');
}

function showMainApp(){
  document.getElementById('pg_auth').classList.remove('v');
  document.getElementById('pg_main').classList.add('v');
  document.getElementById('nav').style.display='flex';

  const isMain = profile?.role==='main';
  document.getElementById('roleBadge').textContent = isMain?'总店':'分店';
  document.getElementById('nav2').style.display = isMain?'flex':'none';
  document.getElementById('nav4').style.display = isMain?'flex':'none';
  document.getElementById('pg_stores').style.display = isMain?'':'none';
  document.getElementById('pg_bills').style.display = isMain?'':'none';
  document.getElementById('prodAddBtn').style.display = isMain?'inline-flex':'none';

  const tabs = document.querySelectorAll('#nav .t');
  tabs.forEach(t=>t.classList.remove('ac'));
  tabs[0].classList.add('ac');
  currentTab=0;
  switchTab(0);
}

async function doLogout(){
  await sb.auth.signOut();
}

/* ============ NAV ============ */
function switchTab(idx){
  if(!profile) return;
  const isMain = profile.role==='main';
  if(!isMain && (idx===2||idx===4)) return;
  currentTab=idx;

  const pages = ['pg_dash','pg_products','pg_stores','pg_orders','pg_bills'];
  const titles = ['仪表盘','商品管理','店铺管理','报货单','供货账单'];
  document.querySelectorAll('#pg_main .page').forEach(p=>p.classList.remove('v'));
  document.getElementById(pages[idx]).classList.add('v');
  document.getElementById('pageTitle').textContent = titles[idx];

  const tabs = document.querySelectorAll('#nav .t');
  tabs.forEach((t,i)=>t.classList.toggle('ac',i===idx));

  refreshTab(idx);
  window.scrollTo(0,0);
}

async function refreshTab(idx){
  if(idx===0) await loadDash();
  if(idx===1) await loadProducts();
  if(idx===2) await loadStores();
  if(idx===3){
    document.getElementById('orderDate').value = new Date().toISOString().slice(0,10);
    await loadOrders();
  }
  if(idx===4){
    await loadBillFilters();
    await loadBills();
  }
}

/* ============ DASHBOARD ============ */
async function loadDash(){
  const isMain = profile.role==='main';
  const today = new Date().toISOString().slice(0,10);

  const [pr,st,od,bl,lo] = await Promise.all([
    sb.from('products').select('id',{count:'exact',head:true}),
    sb.from('stores').select('id',{count:'exact',head:true}),
    sb.from('orders').select('id',{count:'exact',head:true}).eq('date',today),
    sb.from('bills').select('id',{count:'exact',head:true}).eq('status','pending'),
    sb.from('products').select('*').lt('stock',10)
  ]);

  if(isMain){
    document.getElementById('dash_stats').innerHTML = `
      <div class="st"><div class="v">${pr.count||0}</div><div class="l">商品数</div></div>
      <div class="st"><div class="v">${st.count||0}</div><div class="l">店铺数</div></div>
      <div class="st"><div class="v">${od.count||0}</div><div class="l">今日报货</div></div>
      <div class="st"><div class="v">${bl.count||0}</div><div class="l">待结账单</div></div>`;
  } else {
    document.getElementById('dash_stats').innerHTML = `
      <div class="st"><div class="v">${pr.count||0}</div><div class="l">可报商品</div></div>
      <div class="st"><div class="v">${od.count||0}</div><div class="l">今日报货</div></div>
      <div class="st"><div class="v">-</div><div class="l">已确认</div></div>
      <div class="st"><div class="v">-</div><div class="l">待确认</div></div>`;
  }

  const lowDiv = document.getElementById('dash_low');
  if(!lo.data||!lo.data.length){
    lowDiv.innerHTML='<div class="empty"><p>暂无低库存商品</p></div>';
  } else {
    lowDiv.innerHTML = lo.data.map(p=>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr)">
        <span style="font-size:12px">${p.name}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--rd)">${p.stock} ${p.unit||'件'}</span></div>`
    ).join('');
  }

  if(isMain){
    const {data:rbs} = await sb.from('bills').select('*,stores(name)').order('created_at',{ascending:false}).limit(5);
    document.getElementById('dash_bills_link').textContent='查看全部';
    document.getElementById('dash_bills_link').onclick=()=>switchTab(4);
    const rbDiv = document.getElementById('dash_bills');
    if(!rbs||!rbs.length){rbDiv.innerHTML='<div class="empty"><p>暂无账单</p></div>'}else{
      rbDiv.innerHTML = rbs.map(b=>{
        const total = b.total||0;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)">

/* ============ ORDERS ============ */
async function loadOrders(){
  const date = document.getElementById('orderDate').value||new Date().toISOString().slice(0,10);
  let query = sb.from('orders').select('*,stores(name)').eq('date',date);
  if(profile.role!=='main') query = query.eq('created_by',currentUser.id);
  query = query.order('created_at',{ascending:false});
  const {data} = await query;
  const div = document.getElementById('orderList');
  if(!data||!data.length){div.innerHTML=`<div class="empty"><p>${date} 暂无报货单</p></div>`;return}

  // fetch all order items and products
  const oids = data.map(o=>o.id);
  const [{data:items},{data:prods}] = await Promise.all([
    oids.length?sb.from('order_items').select('*').in('order_id',oids):Promise.resolve({data:[]}),
    sb.from('products').select('*')
  ]);
  const prodMap = {}; (prods||[]).forEach(p=>{prodMap[p.id]=p});

  div.innerHTML = data.map(o=>{
    const oi = (items||[]).filter(i=>i.order_id===o.id);
    const total = oi.reduce((s,i)=>s+(prodMap[i.prod_id]?.price||0)*i.qty,0);
    const itemsHtml = oi.map(i=>
      `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0">
        <span style="color:var(--tx2)">${prodMap[i.prod_id]?.name||'未知'}</span>
        <span style="font-family:var(--mono);color:var(--tx2)">×${i.qty}</span></div>`).join('');
    return `<div class="cd">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:500">${profile.role==='main'?o.stores?.name||'未知':o.date}</span>
        <span class="tag ${o.status==='confirmed'?'ok':'warn'}">${o.status==='confirmed'?'已确认':'待确认'}</span></div>
      ${itemsHtml}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">
        <span style="font-family:var(--mono);font-size:14px;color:var(--ac)">¥${total.toFixed(2)}</span>
        <div style="display:flex;gap:6px">
          ${profile.role==='main'&&o.status==='pending'?`<button class="btn btn-w sm" onclick="confirmOrder('${o.id}')">确认</button>`:''}
          <button class="btn btn-d sm" onclick="deleteOrder('${o.id}')">删除</button></div></div></div>`;
  }).join('');
}

async function openOrderModal(){
  const {data:stores} = profile.role==='main'
    ? await sb.from('stores').select('*').eq('type','franchise')
    : await sb.from('stores').select('*').eq('id',profile.store_id);

  const {data:prods} = await sb.from('products').select('*').order('name');
  if(!prods||!prods.length) return alert('暂无商品');
  if(!stores||!stores.length) return alert('无可报货店铺');

  const today = new Date().toISOString().slice(0,10);
  const storeOpts = stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

  let html = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="padding-bottom:24px">
    <div class="modal-h"><h2>新建报货单</h2><div class="close" onclick="closeModal()">×</div></div>
    <div class="fg"><label>日期</label><input type="date" id="of_date" value="${today}"></div>
    ${profile.role==='main'?`<div class="fg"><label>加盟店</label><select id="of_store">${storeOpts}</select></div>`:`<input type="hidden" id="of_store" value="${stores[0].id}">`}
    <div class="fg"><label>选择商品（点击添加，再次点击修改数量）</label></div>
    <div class="prod-pick-list" id="of_prod_list"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)">
      <span style="font-size:12px;color:var(--tx3)">已选 <b id="of_sel_count">0</b> 种</span>
      <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ac)" id="of_total">¥0.00</span></div>
    <button class="btn btn-w block mt12" onclick="saveOrder()">提交报货单</button>
  </div></div>`;
  showModal(html);

  window._orderItems = [];
  window._orderProds = prods;
  function renderPicker(){
    const div = document.getElementById('of_prod_list');
    div.innerHTML = prods.map(p=>{
      const ex = window._orderItems.find(i=>i.prod_id===p.id);
      return `<div class="prod-pick-row${ex?' sel':''}" onclick="window._pickProduct('${p.id}')">
        <div class="pp-info"><div class="pp-name">${p.name}</div>
        <div class="pp-meta">¥${p.price} · 库存 ${p.stock} ${p.unit||'件'}</div></div>
        <div class="pp-check"></div></div>`;
    }).join('');
    updateSum();
  }
  window._pickProduct = function(pid){
    const idx = window._orderItems.findIndex(i=>i.prod_id===pid);
    if(idx>=0){
      const qty = prompt(`${prods.find(p=>p.id===pid)?.name||''}，当前: ${window._orderItems[idx].qty}。新数量(0=移除):`,window._orderItems[idx].qty);
      if(qty===null)return;
      const n = parseInt(qty)||0;
      if(n<=0) window._orderItems.splice(idx,1); else window._orderItems[idx].qty=n;
    } else {
      const qty = prompt(`${prods.find(p=>p.id===pid)?.name||''}，输入数量:`,1);
      if(qty===null)return;
      const n = parseInt(qty)||0;
      if(n>0) window._orderItems.push({prod_id:pid,qty:n});
    }
    renderPicker();
  };
  function updateSum(){
    document.getElementById('of_sel_count').textContent=window._orderItems.length;
    const total=window._orderItems.reduce((s,i)=>s+(prods.find(p=>p.id===i.prod_id)?.price||0)*i.qty,0);
    document.getElementById('of_total').textContent='¥'+total.toFixed(2);
  }
  renderPicker();
}

async function saveOrder(){
  if(!window._orderItems||!window._orderItems.length)return alert('请选择商品');
  const storeId = document.getElementById('of_store').value;
  const date = document.getElementById('of_date').value;
  const {data:order} = await sb.from('orders').insert([{
    store_id: storeId, date, status:'pending', created_by: currentUser.id
  }]).select().single();
  if(!order) return alert('创建失败');
  const items = window._orderItems.map(i=>({order_id:order.id, prod_id:i.prod_id, qty:i.qty}));
  await sb.from('order_items').insert(items);
  closeModal();
  document.getElementById('orderDate').value = date;
  await loadOrders();
}
async function confirmOrder(id){
  await sb.from('orders').update({status:'confirmed'}).eq('id',id);
  await loadOrders();
}
async function deleteOrder(id){
  if(!confirm('确定删除？'))return;
  await sb.from('order_items').delete().eq('order_id',id);
  await sb.from('orders').delete().eq('id',id);
  await loadOrders();
}

async function generateBill(){
  const {data:stores} = await sb.from('stores').select('*').eq('type','franchise');
  if(!stores||!stores.length) return alert('没有加盟店');
  const storeOpts = stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-h"><h2>生成供货账单</h2><div class="close" onclick="closeModal()">×</div></div>
    <div class="fg"><label>加盟店</label><select id="bf_store">${storeOpts}</select></div>
    <div class="fg"><label>日期</label><input type="date" id="bf_date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div id="bf_orders" style="margin-top:8px;max-height:200px;overflow-y:auto"><div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">请选择加盟店</div></div>
    <div style="text-align:right;font-family:var(--mono);font-size:14px;color:var(--ac);margin:8px 0" id="bf_total">¥0.00</div>
    <button class="btn btn-w block" onclick="saveBill()">生成账单</button></div></div>`;
  showModal(html);
  window._billOrderIds = [];
  document.getElementById('bf_store').onchange = async function(){
    const sid = this.value;
    const {data:confirmed} = await sb.from('orders').select('*').eq('store_id',sid).eq('status','confirmed');
    const {data:allBills} = await sb.from('bills').select('id');
    const {data:allBO} = await sb.from('bill_orders').select('order_id');
    const usedIds = new Set((allBO||[]).map(b=>b.order_id));
    const avail = (confirmed||[]).filter(o=>!usedIds.has(o.id));
    const div = document.getElementById('bf_orders');
    if(!avail.length){div.innerHTML='<div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">没有可入账的报货单</div>';return}
    window._billOrderIds = [];
    div.innerHTML = avail.map(o=>{
      const total = o.total||0;
      return `<div class="oi-row" style="cursor:pointer" onclick="window._billOrderIds=window._billOrderIds.includes('${o.id}')?window._billOrderIds.filter(x=>x!=='${o.id}'):[...window._billOrderIds,'${o.id}'];this.style.background=window._billOrderIds.includes('${o.id}')?'rgba(212,148,58,.1)':'';window._updateBfTotal()">
        <span class="prod" style="color:var(--tx2)">${o.date}</span><span class="sub">¥${total.toFixed(2)}</span></div>`;
    }).join('');
    window._updateBfTotal = ()=>{
      const t = window._billOrderIds.reduce((s,oid)=>{const o=avail.find(x=>x.id===oid);return s+(o?.total||0)},0);
      document.getElementById('bf_total').textContent='¥'+t.toFixed(2);
    };
  };
}
async function saveBill(){
  if(!window._billOrderIds||!window._billOrderIds.length) return alert('请选择报货单');
  const {data:selected} = await sb.from('orders').select('id,total').in('id',window._billOrderIds);
  const total = (selected||[]).reduce((s,o)=>s+(o.total||0),0);
  const {data:bill} = await sb.from('bills').insert([{
    store_id: document.getElementById('bf_store').value,
    date: document.getElementById('bf_date').value,
    status:'pending', total, created_by: currentUser.id
  }]).select().single();
  if(!bill) return alert('创建失败');
  const links = window._billOrderIds.map(oid=>({bill_id:bill.id, order_id:oid}));
  await sb.from('bill_orders').insert(links);
  closeModal();await loadBills();
}
async function openBillModal(id){

      <span class="tag ${b.status==='paid'?'ok':'warn'}">${b.status==='paid'?'已结':'待结'}</span></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      ${b.status==='pending'?`<button class="btn btn-w block" onclick="markBillPaid('${b.id}')">标记已结</button>`:''}
      <button class="btn btn-d block" onclick="deleteBill('${b.id}')">删除</button></div></div></div>`);

/* ============ MODAL ============ */
function showModal(html){document.getElementById('modalContainer').innerHTML=html;document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modalContainer').innerHTML='';document.body.style.overflow=''}
