<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>进销存系统</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--srf:#fff;--crd:#fff;--bdr:#e5e5ea;--tx:#1c1c1e;--tx2:#6e6e73;--tx3:#aeaeb2;--ac:#d4943a;--gr:#34c759;--rd:#ff3b30;--mono:'JetBrains Mono',monospace;--r:8px;--rs:5px;--nav:60px;--hd:50px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}
#app{max-width:640px;margin:0 auto;padding:0 16px;padding-bottom:calc(var(--nav)+20px)}

.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90dvh;gap:20px;padding:20px}
.auth-wrap .logo{font-size:26px;font-weight:700;color:var(--ac)}
.auth-wrap .sub{font-size:12px;color:var(--tx2);text-align:center}
.auth-card{background:var(--crd);border-radius:var(--r);padding:24px;border:1px solid var(--bdr);width:100%;max-width:340px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.auth-card .err{font-size:11px;color:var(--rd);text-align:center;margin-top:8px}
.auth-card .ok{font-size:11px;color:var(--gr);text-align:center;margin-top:8px}

#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;height:var(--nav);background:var(--srf);border-top:1px solid var(--bdr);display:flex;z-index:100;border-radius:14px 14px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,.08);padding:0 6px}
#nav .t{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx3);font-size:10px;cursor:pointer;transition:color .18s;gap:3px;user-select:none}
#nav .t.ac{color:var(--ac)}
#nav .t svg{width:22px;height:22px}

.hd{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;height:var(--hd);padding:0 2px;background:var(--bg);border-bottom:1px solid var(--bdr)}
.hd h1{font-size:17px;font-weight:600}
.hd .right{display:flex;align-items:center;gap:6px}
.hd .role{font-size:11px;padding:4px 12px;border-radius:20px;background:#f5f5f7;border:1px solid var(--bdr);color:var(--ac);font-family:var(--mono);font-weight:500}
.hd .logout-btn{font-size:11px;color:var(--rd);cursor:pointer;padding:4px 6px}

.cd{background:var(--crd);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cd-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cd-h span{font-size:13px;font-weight:600;color:var(--tx)}
.cd-h small{font-size:11px;color:var(--tx3)}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st{background:var(--crd);border-radius:var(--r);padding:12px;border:1px solid var(--bdr);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.st .v{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--ac)}
.st .l{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:9px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:14px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--ac)}
.fg-row{display:flex;gap:8px}.fg-row .fg{flex:1}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;min-height:40px}
.btn-w{background:#fff;color:#0a0c14;border:1px solid #ddd}
.btn-w:active{background:#eee}
.btn-b{background:#d0e4f7;color:#0a0c14}
.btn-b:active{background:#a8cce8}
.btn-d{background:transparent;color:var(--rd);border:1px solid var(--rd)}
.btn-d:active{background:var(--rd);color:#fff}
.btn.block{width:100%}.btn.sm{font-size:11px;padding:5px 10px;min-height:28px}.btn:disabled{opacity:.5;pointer-events:none}

.prod-pick-list{max-height:50vh;overflow-y:auto}
.prod-pick-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.prod-pick-row:active{opacity:.7}
.prod-pick-row .pp-info{flex:1}
.prod-pick-row .pp-name{font-size:13px;font-weight:500}
.prod-pick-row .pp-meta{font-size:10px;color:var(--tx3);margin-top:2px}
.prod-pick-row .pp-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.prod-pick-row.sel .pp-check{background:var(--ac);border-color:var(--ac)}
.prod-pick-row.sel .pp-check::after{content:'';width:8px;height:8px;background:#fff;border-radius:50%}

.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;font-family:var(--mono)}
.tag.warn{background:rgba(212,148,58,.1);color:var(--ac)}
.tag.ok{background:rgba(52,199,89,.1);color:var(--gr)}
.tag.err{background:rgba(255,59,48,.1);color:var(--rd)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--srf);border-radius:14px 14px 0 0;width:100%;max-width:640px;max-height:85dvh;overflow-y:auto;padding:16px}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-h h2{font-size:16px;font-weight:600}
.modal-h .close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f5f5f7;cursor:pointer;color:var(--tx3);font-size:18px}
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.page{display:none}.page.v{display:block}
.flex{display:flex}.gap8{gap:8px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.between{justify-content:space-between}.acenter{align-items:center}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<div class="page v" id="pg_auth">
  <div class="auth-wrap">
    <div class="logo">进销存管理</div>
    <div class="sub">多店进销存 · 账号登录</div>
    <div class="auth-card" id="authCard"></div>
  </div>
</div>

<div class="page" id="pg_main">
  <div class="hd"><h1 id="pageTitle">仪表盘</h1><div class="right"><span class="role" id="roleBadge"></span><span class="logout-btn" onclick="doLogout()">退出</span></div></div>
  <div class="page v" id="pg_dash"><div class="stats" id="dash_stats"></div><div class="cd"><div class="cd-h"><span>低库存预警</span></div><div id="dash_low"></div></div><div class="cd" id="dash_bills_box"><div class="cd-h"><span>近期账单</span></div><div id="dash_bills"></div></div></div>
  <div class="page" id="pg_products"><div class="flex between acenter mb8"><input placeholder="搜索商品..." id="prodSearch" oninput="renderProducts()" style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none"><button class="btn btn-b sm" id="prodAddBtn" onclick="openProductModal()">+ 添加</button></div><div id="prodList"></div></div>
  <div class="page" id="pg_stores"><div class="flex between acenter mb8"><span style="font-size:13px;color:var(--tx2)" id="storeCount"></span><button class="btn btn-b sm" onclick="openStoreModal()">+ 添加</button></div><div id="storeList"></div></div>
  <div class="page" id="pg_orders"><div class="flex acenter gap8 mb8"><input type="date" id="orderDate" onchange="renderOrders()" style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;font-family:var(--mono)"><button class="btn btn-w sm" onclick="openOrderModal()">+ 报货</button></div><div id="orderList"></div></div>
  <div class="page" id="pg_bills"><div class="flex acenter gap8 mb8"><select id="billStoreFilter" onchange="renderBills()" style="flex:1;padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none"></select><select id="billStatusFilter" onchange="renderBills()" style="padding:10px 12px;background:#f5f5f7;border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;outline:none;width:100px"><option value="">全部</option><option value="unpaid">未结</option><option value="paid">已结</option></select></div><div id="billList"></div><button class="btn btn-w block mt8" onclick="generateBill()">生成账单</button></div>
</div>

<nav id="nav">
  <div class="t ac" onclick="switchTab(0)" id="nav0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>概览</span></div>
  <div class="t" onclick="switchTab(1)" id="nav1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>商品</span></div>
  <div class="t" onclick="switchTab(2)" id="nav2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>店铺</span></div>
  <div class="t" onclick="switchTab(3)" id="nav3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>报货</span></div>
  <div class="t" onclick="switchTab(4)" id="nav4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg><span>账单</span></div>
</nav>
<div id="modalContainer"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://ldtjjrnvniirfrnmtfbd.supabase.co','sb_publishable_NaiTMvOQ-Zgd0g3RMxU8XQ_0ELa_fsi');
window.sb = sb;

let profile=null,currentTab=0;

/* AUTH */
function renderAuth(mode){
  const isLogin=mode==='login';
  document.getElementById('authCard').innerHTML=`
    <div style="display:flex;margin-bottom:16px">
      <div style="flex:1;text-align:center;padding:8px;font-size:15px;font-weight:600;cursor:pointer;border-bottom:2px solid ${isLogin?'var(--ac)':'var(--bdr)'};color:${isLogin?'var(--tx)':'var(--tx3)'}" onclick="renderAuth('login')">登录</div>
      <div style="flex:1;text-align:center;padding:8px;font-size:15px;font-weight:600;cursor:pointer;border-bottom:2px solid ${!isLogin?'var(--ac)':'var(--bdr)'};color:${!isLogin?'var(--tx)':'var(--tx3)'}" onclick="renderAuth('register')">注册</div></div>
    <div class="fg"><label>邮箱</label><input type="email" id="af_email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fg"><label>密码 (6位以上)</label><input type="password" id="af_pw" placeholder="······" autocomplete="current-password"></div>
    <div class="err" id="af_err"></div>
    <button class="btn btn-w block mt8" onclick="doAuth('${mode}')">${isLogin?'登录':'注册'}</button>`;
}
window.renderAuth=renderAuth;
window.doAuth=async function(mode){
  const email=document.getElementById('af_email').value.trim();
  const pw=document.getElementById('af_pw').value;
  const err=document.getElementById('af_err');
  err.textContent='';err.className='err';
  if(!email||!pw){err.textContent='请填写邮箱和密码';return}
  if(pw.length<6){err.textContent='密码至少6位';return}
  let res;
  if(mode==='login') res=await sb.auth.signInWithPassword({email,password:pw});
  else res=await sb.auth.signUp({email,password:pw});
  if(res.error){err.textContent=res.error.message;return}
  if(mode==='register'){err.className='ok';err.textContent='注册成功，请切换到登录页登录';}
};
window.doLogout=async function(){await sb.auth.signOut();};

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    const {data}=await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
    profile=data||{role:'franchise'};
    if(!data){await sb.from('profiles').upsert({id:session.user.id,role:'franchise',display_name:session.user.email});profile={id:session.user.id,role:'franchise'};}
    showMain();
  }else{showAuth();}
});
async function showAuth(){
  document.getElementById('pg_auth').classList.add('v');
  document.getElementById('pg_main').classList.remove('v');
  document.getElementById('nav').style.display='none';
  renderAuth('login');
}
async function showMain(){
  document.getElementById('pg_auth').classList.remove('v');
  document.getElementById('pg_main').classList.add('v');
  document.getElementById('nav').style.display='flex';
  const isMain=profile.role==='main';
  document.getElementById('roleBadge').textContent=isMain?'总店':'分店';
  document.getElementById('nav2').style.display=isMain?'flex':'none';
  document.getElementById('nav4').style.display=isMain?'flex':'none';
  document.getElementById('pg_stores').style.display=isMain?'':'none';
  document.getElementById('pg_bills').style.display=isMain?'':'none';
  document.getElementById('prodAddBtn').style.display=isMain?'inline-flex':'none';
  switchTab(0);
}
function switchTab(idx){
  if(!profile)return;
  const isMain=profile.role==='main';
  if(!isMain&&(idx===2||idx===4))return;
  currentTab=idx;
  ['pg_dash','pg_products','pg_stores','pg_orders','pg_bills'].forEach((id,i)=>document.getElementById(id).classList.toggle('v',i===idx));
  document.getElementById('pageTitle').textContent=['仪表盘','商品管理','店铺管理','报货单','供货账单'][idx];
  document.querySelectorAll('#nav .t').forEach((t,i)=>t.classList.toggle('ac',i===idx));
  refreshTab(idx);window.scrollTo(0,0);
}
window.switchTab=switchTab;
async function refreshTab(idx){
  if(idx===0)await loadDash();
  if(idx===1)await loadProducts();
  if(idx===2)await loadStores();
  if(idx===3){document.getElementById('orderDate').value=new Date().toISOString().slice(0,10);await loadOrders();}
  if(idx===4){await loadBillFilters();await loadBills();}
}

/* DASH */
async function loadDash(){
  const isMain=profile.role==='main';
  const [{count:pc},{count:sc},{count:oc},{data:lo}]=await Promise.all([
    sb.from('products').select('*',{count:'exact',head:true}),
    sb.from('stores').select('*',{count:'exact',head:true}),
    sb.from('orders').select('*',{count:'exact',head:true}),
    sb.from('products').select('*').lt('stock',10)
  ]);
  document.getElementById('dash_stats').innerHTML=`
    <div class="st"><div class="v">${pc||0}</div><div class="l">商品数</div></div>
    <div class="st"><div class="v">${sc||0}</div><div class="l">店铺数</div></div>
    <div class="st"><div class="v">${oc||0}</div><div class="l">报货单</div></div>
    <div class="st"><div class="v">-</div><div class="l">待结</div></div>`;
  const lowDiv=document.getElementById('dash_low');
  if(!lo||!lo.length)lowDiv.innerHTML='<div class="empty"><p>暂无低库存</p></div>';
  else lowDiv.innerHTML=lo.map(p=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:12px">${p.name}</span><span style="font-family:var(--mono);font-size:12px;color:var(--rd)">${p.stock} 件</span></div>`).join('');
  if(isMain){
    const {data:rbs}=await sb.from('bills').select('*,stores(name)').order('created_at',{ascending:false}).limit(5);
    document.getElementById('dash_bills_box').style.display='';
    const div=document.getElementById('dash_bills');
    if(!rbs||!rbs.length)div.innerHTML='<div class="empty"><p>暂无账单</p></div>';
    else div.innerHTML=rbs.map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:12px">${b.stores?.name||'未知'}</span><span style="font-family:var(--mono);font-size:12px;color:var(--ac)">¥${(b.total||0).toFixed(2)}</span><span class="tag ${b.status==='paid'?'ok':'warn'}">${b.status==='paid'?'已结':'待结'}</span></div>`).join('');
  }else{document.getElementById('dash_bills_box').style.display='none';}
}

/* PRODUCTS */
async function loadProducts(){
  const q=(document.getElementById('prodSearch')?.value||'').toLowerCase();
  let query=sb.from('products').select('*').order('created_at');
  if(q)query=query.ilike('name',`%${q}%`);
  const {data}=await query;
  const div=document.getElementById('prodList');
  if(!data||!data.length){div.innerHTML='<div class="empty"><p>暂无商品</p></div>';return}
  div.innerHTML=data.map(p=>`<div class="cd" ${profile.role==='main'?`style="cursor:pointer" onclick="openProductModal('${p.id}')"`:''}><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:13px;font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${p.sku||''}</div></div><span class="tag ${p.stock<10?'err':p.stock<30?'warn':'ok'}">库存 ${p.stock}</span></div><div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--tx2)"><span>批发 ¥${p.price}</span><span>零售 ¥${p.price2}</span></div></div>`).join('');
}
window.openProductModal=function(id){
  if(profile.role!=='main')return;
  const p=window._pc?.find(x=>x.id===id);
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>${p?'编辑':'添加'}商品</h2><div class="close" onclick="closeModal()">×</div></div>
    <div class="fg"><label>名称</label><input id="pf_name" value="${p?p.name:''}"></div>
    <div class="fg"><label>SKU</label><input id="pf_sku" value="${p?p.sku||'':''}"></div>
    <div class="fg-row"><div class="fg"><label>批发价</label><input id="pf_price" type="number" step="0.01" value="${p?p.price:''}"></div><div class="fg"><label>零售价</label><input id="pf_price2" type="number" step="0.01" value="${p?p.price2:''}"></div></div>
    <div class="fg-row"><div class="fg"><label>库存</label><input id="pf_stock" type="number" value="${p?p.stock||0}"></div><div class="fg"><label>单位</label><input id="pf_unit" value="${p?p.unit||'件'}"></div></div>
    <div style="display:flex;gap:8px;margin-top:14px">${p?`<button class="btn btn-d block" onclick="deleteProduct('${p.id}')">删除</button>`:''}<button class="btn btn-w block" onclick="saveProduct('${p?p.id:''}')">保存</button></div></div></div>`);
};
window.saveProduct=async function(id){
  const d={name:document.getElementById('pf_name').value.trim(),sku:document.getElementById('pf_sku').value.trim(),price:parseFloat(document.getElementById('pf_price').value)||0,price2:parseFloat(document.getElementById('pf_price2').value)||0,stock:parseInt(document.getElementById('pf_stock').value)||0,unit:document.getElementById('pf_unit').value.trim()||'件'};
  if(!d.name)return alert('请输入名称');
  if(id)await sb.from('products').update(d).eq('id',id);else await sb.from('products').insert(d);
  closeModal();await loadProducts();
};
window.deleteProduct=async function(id){if(!confirm('确定删除？'))return;await sb.from('products').delete().eq('id',id);closeModal();await loadProducts();};

/* STORES */
async function loadStores(){
  const {data}=await sb.from('stores').select('*').order('created_at');
  document.getElementById('storeCount').textContent=`共 ${data?.length||0} 家`;
  const tp={main:'总店',branch:'分店',franchise:'加盟店'};
  document.getElementById('storeList').innerHTML=(data||[]).map(s=>`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:13px;font-weight:500">${s.name}</div><div style="font-size:10px;color:var(--tx3);margin-top:2px">${s.addr||''}</div></div><span class="tag ${s.type==='main'?'info':s.type==='branch'?'ok':'warn'}">${tp[s.type]||''}</span></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><span style="font-size:10px;color:var(--tx3)">${s.contact||''} ${s.phone||''}</span>${s.type==='main'?'':`<button class="btn btn-b sm" onclick="openStoreModal('${s.id}')">编辑</button>`}</div></div>`).join('');
}
window.openStoreModal=function(id){
  const s=window._sc?.find(x=>x.id===id);
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>${s?'编辑':'添加'}店铺</h2><div class="close" onclick="closeModal()">×</div></div>
    <div class="fg"><label>名称</label><input id="sf_name" value="${s?s.name:''}"></div>
    <div class="fg"><label>类型</label><select id="sf_type"><option value="franchise" ${s&&s.type==='franchise'?'selected':''}>加盟店</option><option value="branch" ${s&&s.type==='branch'?'selected':''}>分店</option><option value="main" ${s&&s.type==='main'?'selected':''}>总店</option></select></div>
    <div class="fg"><label>联系人</label><input id="sf_contact" value="${s?s.contact||'':''}"></div>
    <div class="fg"><label>电话</label><input id="sf_phone" value="${s?s.phone||'':''}"></div>
    <div class="fg"><label>地址</label><input id="sf_addr" value="${s?s.addr||'':''}"></div>
    <div style="display:flex;gap:8px;margin-top:14px">${s&&s.type!=='main'?`<button class="btn btn-d block" onclick="deleteStore('${s.id}')">删除</button>`:''}<button class="btn btn-w block" onclick="saveStore('${s?s.id:''}')">保存</button></div></div></div>`);
};
window.saveStore=async function(id){
  const d={name:document.getElementById('sf_name').value.trim(),type:document.getElementById('sf_type').value,contact:document.getElementById('sf_contact').value.trim(),phone:document.getElementById('sf_phone').value.trim(),addr:document.getElementById('sf_addr').value.trim()};
  if(!d.name)return alert('请输入名称');
  if(id)await sb.from('stores').update(d).eq('id',id);else await sb.from('stores').insert(d);
  closeModal();await loadStores();
};
window.deleteStore=async function(id){if(!confirm('确定删除？'))return;await sb.from('stores').delete().eq('id',id);closeModal();await loadStores();};

/* ORDERS */
async function loadOrders(){
  const date=document.getElementById('orderDate').value;
  let query=sb.from('orders').select('*,stores(name)').eq('date',date);
  if(profile.role!=='main')query=query.eq('user_id',profile.id);
  const {data}=await query.order('created_at',{ascending:false});
  const div=document.getElementById('orderList');
  if(!data||!data.length){div.innerHTML=`<div class="empty"><p>${date} 无报货单</p></div>`;return}
  const oids=data.map(o=>o.id);
  const [{data:items},{data:prods}]=await Promise.all([
    oids.length?sb.from('order_items').select('*').in('order_id',oids):Promise.resolve({data:[]}),
    sb.from('products').select('*')
  ]);
  const pm={};(prods||[]).forEach(p=>pm[p.id]=p);
  div.innerHTML=data.map(o=>{const oi=(items||[]).filter(i=>i.order_id===o.id);const total=oi.reduce((s,i)=>s+(pm[i.product_name]?parseFloat(pm[i.product_name].price||0)*i.quantity:0),0);const ih=oi.map(i=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0"><span style="color:var(--tx2)">${i.product_name}</span><span style="font-family:var(--mono);color:var(--tx2)">×${i.quantity}</span></div>`).join('');return `<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:500">${profile.role==='main'?o.stores?.name||'':o.date}</span><span class="tag ${o.status==='confirmed'?'ok':'warn'}">${o.status==='confirmed'?'已确认':'待确认'}</span></div>${ih}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)"><span style="font-family:var(--mono);font-size:14px;color:var(--ac)">¥${total.toFixed(2)}</span><div style="display:flex;gap:6px">${profile.role==='main'&&o.status==='pending'?`<button class="btn btn-w sm" onclick="confirmOrder('${o.id}')">确认</button>`:''}<button class="btn btn-d sm" onclick="deleteOrder('${o.id}')">删除</button></div></div></div>`}).join('');
}
window.openOrderModal=async function(){
  const [{data:stores},{data:prods}]=await Promise.all([
    profile.role==='main'?sb.from('stores').select('*').eq('type','franchise'):sb.from('stores').select('*').eq('type','branch'),
    sb.from('products').select('*').order('name')
  ]);
  if(!prods||!prods.length)return alert('暂无商品');
  const today=new Date().toISOString().slice(0,10);
  const so=(stores||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="padding-bottom:24px"><div class="modal-h"><h2>新建报货单</h2><div class="close" onclick="closeModal()">×</div></div><div class="fg"><label>日期</label><input type="date" id="of_date" value="${today}"></div>${profile.role==='main'?`<div class="fg"><label>加盟店</label><select id="of_store">${so}</select></div>`:`<input type="hidden" id="of_store" value="${stores&&stores[0]?stores[0].id:''}">`}<div class="fg"><label>选择商品</label></div><div class="prod-pick-list" id="of_prod_list"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)"><span style="font-size:12px;color:var(--tx3)">已选 <b id="of_sel">0</b> 种</span><span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--ac)" id="of_total">¥0.00</span></div><button class="btn btn-w block mt12" onclick="saveOrder()">提交</button></div></div>`);
  window._oi=[];
  function rp(){
    document.getElementById('of_prod_list').innerHTML=prods.map(p=>{const ex=window._oi.find(i=>i.product_name===p.name);return `<div class="prod-pick-row${ex?' sel':''}" onclick="window._pick('${p.id}')"><div class="pp-info"><div class="pp-name">${p.name}</div><div class="pp-meta">¥${p.price} 库存${p.stock}</div></div><div class="pp-check"></div></div>`}).join('');
    us();
  }
  window._pick=function(pid){const p=prods.find(x=>x.id===pid);if(!p)return;const idx=window._oi.findIndex(i=>i.product_name===p.name);if(idx>=0){const qty=prompt(`${p.name} 当前:${window._oi[idx].quantity} 新数量(0=移除):`,window._oi[idx].quantity);if(qty===null)return;const n=parseInt(qty)||0;if(n<=0)window._oi.splice(idx,1);else window._oi[idx].quantity=n}else{const qty=prompt(`${p.name} 数量:`,1);if(qty===null)return;const n=parseInt(qty)||0;if(n>0)window._oi.push({product_name:p.name,quantity:n,price:p.price})}rp();};
  function us(){document.getElementById('of_sel').textContent=window._oi.length;document.getElementById('of_total').textContent='¥'+window._oi.reduce((s,i)=>s+i.price*i.quantity,0).toFixed(2);}
  rp();
};
window.saveOrder=async function(){
  if(!window._oi||!window._oi.length)return alert('请选择商品');
  const sid=document.getElementById('of_store').value;
  const date=document.getElementById('of_date').value;
  const total=window._oi.reduce((s,i)=>s+i.price*i.quantity,0);
  const {data:order}=await sb.from('orders').insert({store_id:sid,date,status:'pending',user_id:profile.id,total}).select().single();
  if(!order)return alert('创建失败');
  await sb.from('order_items').insert(window._oi.map(i=>({order_id:order.id,product_name:i.product_name,quantity:i.quantity,price:i.price})));
  closeModal();document.getElementById('orderDate').value=date;await loadOrders();
};
window.confirmOrder=async function(id){await sb.from('orders').update({status:'confirmed'}).eq('id',id);await loadOrders();};
window.deleteOrder=async function(id){if(!confirm('确定删除？'))return;await sb.from('order_items').delete().eq('order_id',id);await sb.from('orders').delete().eq('id',id);await loadOrders();};

/* BILLS */
async function loadBillFilters(){
  const {data}=await sb.from('stores').select('*').eq('type','franchise').order('name');
  document.getElementById('billStoreFilter').innerHTML='<option value="">全部</option>'+(data||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}
async function loadBills(){
  const sf=document.getElementById('billStoreFilter').value,ss=document.getElementById('billStatusFilter').value;
  let query=sb.from('bills').select('*,stores(name)').order('created_at',{ascending:false});
  if(sf)query=query.eq('store_id',sf);
  if(ss)query=query.eq('status',ss);
  const {data}=await query;
  const div=document.getElementById('billList');
  if(!data||!data.length){div.innerHTML='<div class="empty"><p>暂无账单</p></div>';return}
  div.innerHTML=data.map(b=>`<div class="cd" onclick="openBillModal('${b.id}')" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:500">${b.stores?.name||''}</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono)">${b.period||b.date||''}</div></div><div style="text-align:right"><div style="font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ac)">¥${(b.total||0).toFixed(2)}</div><span class="tag ${b.status==='paid'?'ok':'warn'}" style="margin-top:4px">${b.status==='paid'?'已结':'未结'}</span></div></div></div>`).join('');
}
window.generateBill=async function(){
  const {data:stores}=await sb.from('stores').select('*').eq('type','franchise');
  if(!stores||!stores.length)return alert('无加盟店');
  const so=stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>生成账单</h2><div class="close" onclick="closeModal()">×</div></div><div class="fg"><label>加盟店</label><select id="bf_store">${so}</select></div><div class="fg"><label>期间</label><input type="text" id="bf_period" value="${new Date().toISOString().slice(0,7)}"></div><div id="bf_orders" style="margin-top:8px;max-height:200px;overflow-y:auto"><div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">请选择加盟店</div></div><div style="text-align:right;font-family:var(--mono);font-size:14px;color:var(--ac);margin:8px 0" id="bf_total">¥0.00</div><button class="btn btn-w block" onclick="saveBill()">生成</button></div></div>`);
  window._bids=[];
  document.getElementById('bf_store').onchange=async function(){
    const sid=this.value;
    const {data:orders}=await sb.from('orders').select('*').eq('store_id',sid).eq('status','confirmed');
    const {data:allBO}=await sb.from('bill_orders').select('order_id');
    const used=new Set((allBO||[]).map(b=>b.order_id));
    const avail=(orders||[]).filter(o=>!used.has(o.id));
    const div=document.getElementById('bf_orders');
    if(!avail.length){div.innerHTML='<div style="color:var(--tx3);font-size:12px;text-align:center;padding:12px">无可入账报货单</div>';return}
    window._bids=[];window._avail=avail;
    div.innerHTML=avail.map(o=>`<div class="oi-row" style="cursor:pointer" onclick="const idx=window._bids.indexOf('${o.id}');if(idx>=0)window._bids.splice(idx,1);else window._bids.push('${o.id}');this.style.background=window._bids.includes('${o.id}')?'rgba(212,148,58,.1)':'';let t=0;window._bids.forEach(id=>{const oo=window._avail.find(x=>x.id===id);t+=oo?.total||0});document.getElementById('bf_total').textContent='¥'+t.toFixed(2)"><span class="prod" style="color:var(--tx2)">${o.date}</span><span class="sub">¥${(o.total||0).toFixed(2)}</span></div>`).join('');
  };
};
window.saveBill=async function(){
  if(!window._bids||!window._bids.length)return alert('请选择报货单');
  const total=window._bids.reduce((s,id)=>{const o=window._avail.find(x=>x.id===id);return s+(o?.total||0)},0);
  const {data:bill}=await sb.from('bills').insert({store_id:document.getElementById('bf_store').value,period:document.getElementById('bf_period').value,total,status:'unpaid',user_id:profile.id}).select().single();
  if(!bill)return alert('创建失败');
  await sb.from('bill_orders').insert(window._bids.map(oid=>({bill_id:bill.id,order_id:oid})));
  closeModal();await loadBills();
};
window.openBillModal=async function(id){
  const {data:b}=await sb.from('bills').select('*,stores(name)').eq('id',id).single();if(!b)return;
  const {data:links}=await sb.from('bill_orders').select('*').eq('bill_id',id);
  const oids=(links||[]).map(l=>l.order_id);
  const [{data:orders},{data:items}]=await Promise.all([
    oids.length?sb.from('orders').select('*').in('id',oids):Promise.resolve({data:[]}),
    oids.length?sb.from('order_items').select('*').in('order_id',oids):Promise.resolve({data:[]})
  ]);
  const det=(orders||[]).map(o=>{const oi=(items||[]).filter(i=>i.order_id===o.id);const rows=oi.map(i=>`<tr><td>${i.product_name}</td><td style="font-family:var(--mono)">${i.quantity}</td><td style="font-family:var(--mono)">¥${(i.price||0).toFixed(2)}</td><td style="font-family:var(--mono)">¥${((i.price||0)*i.quantity).toFixed(2)}</td></tr>`).join('');return `<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--tx3);margin-bottom:4px">${o.date}</div><table class="tbl"><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr>${rows}</table></div>`}).join('');
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>账单详情</h2><div class="close" onclick="closeModal()">×</div></div><div style="margin-bottom:12px"><div style="font-size:14px;font-weight:600">${b.stores?.name||''}</div><div style="font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:2px">${b.period||''}</div></div>${det}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)"><span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ac)">¥${(b.total||0).toFixed(2)}</span><span class="tag ${b.status==='paid'?'ok':'warn'}">${b.status==='paid'?'已结':'未结'}</span></div><div style="display:flex;gap:8px;margin-top:16px">${b.status!=='paid'?`<button class="btn btn-w block" onclick="markPaid('${b.id}')">标记已结</button>`:''}<button class="btn btn-d block" onclick="deleteBill('${b.id}')">删除</button></div></div></div>`);
};
window.markPaid=async function(id){await sb.from('bills').update({status:'paid'}).eq('id',id);closeModal();await loadBills();};
window.deleteBill=async function(id){if(!confirm('确定删除？'))return;await sb.from('bill_orders').delete().eq('bill_id',id);await sb.from('bills').delete().eq('id',id);closeModal();await loadBills();};

function showModal(html){document.getElementById('modalContainer').innerHTML=html;document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modalContainer').innerHTML='';document.body.style.overflow=''}
window.closeModal=closeModal;

/* BOOT */
(async function(){
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    const {data}=await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
    profile=data||{id:session.user.id,role:'franchise'};
    if(!data)await sb.from('profiles').upsert({id:session.user.id,role:'franchise',display_name:session.user.email});
    showMain();
  }else{showAuth();}
})();
</script>
</body>
